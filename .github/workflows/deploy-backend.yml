name: Deploy Backend to Azure App Service

on:
  push:
    branches:
      - main
    paths:
      - 'app-builder/backend/**'
      - '.github/workflows/deploy-backend.yml'
  workflow_dispatch:

env:
  AZURE_WEBAPP_NAME: apptura
  BACKEND_PATH: app-builder/backend
  NODE_VERSION: '22.x'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: ${{ env.BACKEND_PATH }}/package-lock.json

      - name: Install dependencies
        working-directory: ${{ env.BACKEND_PATH }}
        run: npm ci

      - name: Build backend
        working-directory: ${{ env.BACKEND_PATH }}
        run: npm run build

      - name: Prune dev dependencies
        working-directory: ${{ env.BACKEND_PATH }}
        run: npm prune --omit=dev

      - name: Upload backend artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend
          path: |
            ${{ env.BACKEND_PATH }}/dist
            ${{ env.BACKEND_PATH }}/node_modules
            ${{ env.BACKEND_PATH }}/package.json
            ${{ env.BACKEND_PATH }}/package-lock.json
          if-no-files-found: error

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download backend artifact
        uses: actions/download-artifact@v4
        with:
          name: backend

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          package: .
